<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inPro — Setting up your profile...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #0A66C2;
    --blue-light: #EBF3FB;
    --text: #1C1C1C;
    --text-2: #666666;
    --border: #E0E0E0;
    --bg: #F3F2EF;
    --white: #FFFFFF;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--white); border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 48px 40px; max-width: 480px; width: 100%;
    text-align: center;
  }
  .logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 32px; }
  .logo-bubble {
    width: 36px; height: 36px; background: var(--blue);
    border-radius: 8px 8px 8px 2px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-bubble::after {
    content: ''; position: absolute; bottom: -4px; left: 4px;
    border-left: 6px solid var(--blue); border-bottom: 5px solid transparent;
  }
  .logo-in { font-weight: 700; font-size: 16px; color: white; }
  .logo-pro { font-weight: 700; font-size: 20px; color: var(--text); }

  .spinner {
    width: 48px; height: 48px; border: 3px solid var(--blue-light);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 14px; color: var(--text-2); line-height: 1.6; }

  .profile-card {
    display: none;
    background: var(--bg); border-radius: 8px;
    border: 1px solid var(--border);
    padding: 20px; margin-top: 24px; text-align: left;
  }
  .profile-top { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .profile-pic {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--blue); display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: white; flex-shrink: 0;
    overflow: hidden;
  }
  .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
  .profile-name { font-size: 18px; font-weight: 600; }
  .profile-headline { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .profile-email { font-size: 12px; color: var(--blue); margin-top: 4px; }

  .success-icon {
    display: none;
    width: 48px; height: 48px; background: #057642;
    border-radius: 50%; margin: 0 auto 24px;
    align-items: center; justify-content: center;
  }
  .success-icon svg { width: 24px; height: 24px; }

  .btn {
    display: inline-block; margin-top: 24px;
    background: var(--blue); color: white; border: none;
    padding: 12px 28px; border-radius: 24px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; text-decoration: none;
    transition: background 0.15s;
  }
  .btn:hover { background: #004182; }

  .error-state { display: none; }
  .error-state h1 { color: #cc0000; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-bubble"><span class="logo-in">in</span></div>
    <span class="logo-pro">Pro</span>
  </div>

  <!-- Loading state -->
  <div id="loading-state">
    <div class="spinner"></div>
    <h1>Setting up your profile...</h1>
    <p>We're pulling your LinkedIn profile. This takes just a second.</p>
  </div>

  <!-- Success state -->
  <div id="success-state" style="display:none;">
    <div class="success-icon" id="success-icon" style="display:flex;">
      <svg viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </div>
    <h1>Welcome to inPro! 🎉</h1>
    <p>Your profile has been created from your LinkedIn. Here's what we pulled:</p>
    <div class="profile-card" id="profile-card">
      <div class="profile-top">
        <div class="profile-pic" id="profile-pic"></div>
        <div>
          <div class="profile-name" id="profile-name"></div>
          <div class="profile-headline" id="profile-headline"></div>
          <div class="profile-email" id="profile-email"></div>
        </div>
      </div>
    </div>
    <a href="https://ira-commits.github.io/inpro-ai" class="btn">Go to my Dashboard →</a>
  </div>

  <!-- Error state -->
  <div id="error-state" class="error-state">
    <h1>Something went wrong</h1>
    <p id="error-message">We couldn't complete your login. Please try again.</p>
    <a href="https://ira-commits.github.io/inpro-ai" class="btn">Go back</a>
  </div>
</div>

<script>
  const CLIENT_ID = '86qzhne1a9j8fn';
  const REDIRECT_URI = 'https://ira-commits.github.io/inpro-ai/callback.html';

  function showError(msg) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('success-state').style.display = 'none';
    const err = document.getElementById('error-state');
    err.style.display = 'block';
    document.getElementById('error-message').textContent = msg;
  }

  function showProfile(data) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('success-state').style.display = 'block';

    const name = (data.given_name || '') + ' ' + (data.family_name || '');
    const initials = ((data.given_name || '?')[0] + (data.family_name || '?')[0]).toUpperCase();

    document.getElementById('profile-name').textContent = name.trim();
    document.getElementById('profile-headline').textContent = data.headline || 'LinkedIn Member';
    document.getElementById('profile-email').textContent = data.email || '';

    const picEl = document.getElementById('profile-pic');
    if (data.picture) {
      picEl.innerHTML = `<img src="${data.picture}" alt="${name}">`;
    } else {
      picEl.textContent = initials;
    }

    document.getElementById('profile-card').style.display = 'block';

    // Save to localStorage so dashboard can use it
    localStorage.setItem('inpro_user', JSON.stringify({
      name: name.trim(),
      headline: data.headline || '',
      email: data.email || '',
      picture: data.picture || '',
      initials: initials,
      linkedin_sub: data.sub || ''
    }));
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    if (error) {
      showError('LinkedIn login was cancelled or failed. Please try again.');
      return;
    }

    if (!code) {
      showError('No authorization code received from LinkedIn.');
      return;
    }

    // Verify state matches
    const savedState = sessionStorage.getItem('linkedin_state');
    if (state !== savedState) {
      showError('Security check failed. Please try again.');
      return;
    }

    try {
      // Use LinkedIn's userinfo endpoint directly
      // Note: Token exchange requires a backend server due to CORS
      // For GitHub Pages (static only), we'll use the implicit flow workaround
      // and show the user a success message directing them to complete setup
      
      // Since GitHub Pages can't run server code, we'll show success
      // and collect their info via a simple form as interim solution
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
      
      // Store the auth code for when we have a backend
      localStorage.setItem('inpro_auth_code', code);
      
      // Show a welcome with manual profile entry for now
      document.getElementById('profile-card').style.display = 'block';
      document.getElementById('profile-name').textContent = 'Welcome!';
      document.getElementById('profile-headline').textContent = 'LinkedIn login successful ✓';
      document.getElementById('profile-email').textContent = 'Your account has been connected';
      
      const picEl = document.getElementById('profile-pic');
      picEl.textContent = '✓';
      picEl.style.background = '#057642';

    } catch (err) {
      showError('Something went wrong: ' + err.message);
    }
  }

  handleCallback();
</script>
</body>
</html>
